name: Bridge issue-form widgets to native fields (reusable)

# Reusable workflow that parses an issue body for `### <Label>\n\n<value>`
# sections produced by the issue-form templates (`task.yml`, `bug.yml`, etc.
# in coo-labs/vade-coo-memory and mirrored across the four primary repos)
# and writes the corresponding native Issue field values via the
# `setIssueFieldValue` GraphQL mutation.
#
# Called from per-repo trigger workflows (`bridge-form-fields-trigger.yml`)
# in vade-coo-memory / vade-runtime / vade-core / vade-agent-logs.
#
# Canonical design: coo-labs/vade-coo-memory#811 + MEMO-2026-05-21-xfqh.
# Pinning matrix + field IDs: coo/operations/issue-fields-and-types.md.
#
# Fires only on `issues.opened` (one-shot bridging at creation time).
# Body-edits do not re-trigger — users update native fields via the
# issue's side panel after creation, not by editing body sections.
#
# Prerequisites in each caller repo:
#   - `secrets.VADE_FIELDS_ADMIN_PAT` — fine-grained PAT with
#     org-level Issue fields write scope. Org-level secret slot;
#     holds the same value as the COO's `GITHUB_MCP_PAT` env var
#     (the COO PAT at `op://COO/vade-coo-self-2026-04/token`),
#     renamed around the GitHub Actions reserved `GITHUB_*` prefix
#     per vade-coo-memory#848. When the COO PAT rotates, this org
#     secret slot needs the new value pasted in too (third rotation
#     surface; see MEMO-2026-05-21-zf7d).
#
# Cross-repo workflow access requires coo-labs/vade-runtime's
# Settings → Actions → General → Access set to
# "Accessible from repositories in the 'coo-labs' organization".

on:
  workflow_call:
    inputs:
      issue-number:
        description: Issue number to bridge.
        type: number
        required: true
      repo-full-name:
        description: Full owner/repo of the calling repository (e.g. coo-labs/vade-coo-memory).
        type: string
        required: true
      dry-run:
        description: If true, print intended mutations without applying.
        type: boolean
        required: false
        default: false
    secrets:
      VADE_FIELDS_ADMIN_PAT:
        description: "PAT with org-level Issue fields write scope. Resolved from secrets-inherit in caller workflows (same-named org secret with selected-repo visibility scoped to the four primary repos)."
        required: true

permissions:
  contents: read
  issues: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vade-runtime (script source)
        uses: actions/checkout@v4
        with:
          repository: coo-labs/vade-runtime
          ref: main

      - name: Run bridge
        env:
          GH_TOKEN: ${{ secrets.VADE_FIELDS_ADMIN_PAT }}
          REPO_FULL_NAME: ${{ inputs.repo-full-name }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          DRY_RUN: ${{ inputs.dry-run && '1' || '0' }}
        run: python3 scripts/bridge-form-fields-to-natives.py
