name: Issue / PR hygiene

# Thin trigger: fires on PR/issue events and delegates to the canonical
# reusable workflow at vade-app/vade-coo-memory/.github/workflows/issue-pr-hygiene-reusable.yml.
#
# Centralization: vade-coo-memory#939 (F7). Per-repo behavior is one
# input: `pattern-b-mode`.
#
# vade-runtime starts on `advisory`. Promotion to `blocking` is governed
# by coo/adoption_tracker.md betterment cadence (≥14 days clean) — change
# the `pattern-b-mode` value below when ready.

on:
  pull_request:
    # `synchronize` (push commits to PR branch) dropped: the title/body —
    # the only thing these checks examine — doesn't change on commit push,
    # so synchronize events are pure 1-min-floor waste. `edited` stays so
    # users can fix a failed check by editing the body in place.
    types: [opened, edited, reopened]
  issues:
    types: [opened, edited, labeled]

permissions:
  pull-requests: write
  issues: write
  contents: read
  checks: write
  actions: read  # required to resolve a workflow_call ref in a private repo (vcm)

jobs:
  hygiene:
    uses: vade-app/vade-coo-memory/.github/workflows/issue-pr-hygiene-reusable.yml@main
    with:
      pattern-b-mode: advisory
    secrets: inherit
