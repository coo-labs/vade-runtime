name: Sync issue templates

# Canonical for the org's per-type ISSUE_TEMPLATE inventory. Fires on push to
# main when .github/ISSUE_TEMPLATE/** or the workflow / script changes; opens
# a sync PR in each active non-meta consumer repo listed in
# coo-labs/.github/repos.yaml (minus coo-harness, the canonical).
#
# Centralization: coo-memory#938 (F8). Mechanism rationale (sync-action
# vs symlink vs build-time): coo-memory/coo/audits/2026-05-24_org-infrastructure-audit/
# f7-f8-centralization-design.md §"Issue templates". Operations doc:
# coo-memory/coo/operations/template-centralization.md.
#
# Canonical-host pivot (vcm → vrt): vrt aligns with the F7 pattern — harness
# owns operational infrastructure; ops doc + case-law live in vcm. Templates
# are bridge surface; their natural home is alongside the bridge workflow
# already in vrt.
#
# Auth: secrets.VADE_FIELDS_ADMIN_PAT (org-secret mirror of GITHUB_MCP_PAT,
# visibility=all, fine-grained, contents:write + pull-requests:write on all
# coo-labs/* repos per the secrets schema entry for `vade-coo-self-2026-04`).
# Same secret bridge-form-fields-to-natives.yml uses.
#
# Sync implementation: scripts/sync-templates-to-consumers.sh. Replaces
# BetaHuhn/repo-file-sync-action after its Node 20 deprecation
# (coo-harness#321). Consumer list is read at job-time from
# coo-labs/.github/repos.yaml (the F17 canonical registry); the previous
# .github/sync.yml + drift-check were vestigial after the action removal.
#
# Trigger-path principle (coo-harness#320): fire on output changes (the
# templates) only — not on implementation changes (this workflow file or
# the sync script). Implementation edits should be tested via
# workflow_dispatch with dry_run=true, not by force-merging through 8
# consumer repos. The original incident: vrt#319's second sync wave at
# 2026-05-25T10:44 fired purely on a workflow-file edit during the F9
# rename (a no-content change), opening 8 live PRs across consumers.

on:
  push:
    branches: [main]
    paths:
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (no PRs opened in consumers)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: sync-issue-templates
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync ISSUE_TEMPLATE/ to consumers
        env:
          GH_TOKEN: ${{ secrets.VADE_FIELDS_ADMIN_PAT }}
        run: |
          bash scripts/sync-templates-to-consumers.sh \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}

      # Enable squash auto-merge on each sync PR from the source side. The
      # auto-merge-sync-pr-reusable.yml thin-trigger pattern in consumers
      # cannot succeed because the default GITHUB_TOKEN lacks
      # mergePullRequest permission (coo-harness#326). Driving the merge
      # from here with VADE_FIELDS_ADMIN_PAT closes that gap with a single
      # source-side change rather than 9 cross-repo edits.
      - name: Enable auto-merge on consumer sync PRs
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        env:
          GH_TOKEN: ${{ secrets.VADE_FIELDS_ADMIN_PAT }}
        run: |
          consumers="$(gh api repos/coo-labs/.github/contents/repos.yaml --jq '.content | @base64d' \
            | yq -r '.repos[] | select(.status == "active" and .tier != "meta" and .name != "coo-harness") | "coo-labs/" + .name')"
          for repo in $consumers; do
            [ -z "$repo" ] && continue
            pr="$(gh pr list -R "$repo" --label sync:templates --state open --json number --jq '.[0].number // empty')"
            if [ -n "$pr" ]; then
              echo "::notice::Enabling squash auto-merge: $repo#$pr"
              gh pr merge "$pr" --squash --auto --repo "$repo" \
                || echo "::warning::Failed to enable auto-merge on $repo#$pr"
            fi
          done
