name: Bridge issue-form widgets to native fields (trigger)

# Triggers the bridge reusable workflow at
# coo-labs/coo-harness/.github/workflows/bridge-form-fields-to-natives.yml
# whenever an issue is opened in this repository.
#
# This file is hand-mirrored across coo-memory / coo-harness /
# vade-canvas / coo-logs. Edit canonical in coo-memory and
# port to siblings (workflow-sync convention; see
# coo/operations/issue-pr-hygiene.md).
#
# Bridge design + script source: coo-labs/coo-harness#TBD.
# Stage 2 design: coo-labs/coo-memory#811.

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to re-bridge.
        required: true
        type: number
      dry_run:
        description: Dry-run (print intended mutations without applying).
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  bridge:
    uses: ./.github/workflows/bridge-form-fields-to-natives.yml
    with:
      issue-number: ${{ github.event.issue.number || inputs.issue_number }}
      repo-full-name: ${{ github.repository }}
    secrets: inherit
