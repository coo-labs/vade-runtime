name: Auto-add new PRs to the VADE project

# Thin trigger: fires on PR open/reopen and delegates to the canonical
# reusable workflow at vade-app/vade-coo-memory/.github/workflows/auto-add-prs-to-project-reusable.yml.
#
# Centralization: vade-coo-memory#939 (F7). Logic + project IDs live in
# the reusable; this file only carries the event trigger and the
# per-repo opt-in. To opt OUT, delete this file.

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  add:
    # Same-repo call uses relative path (see coo-on-assign.yml note).
    # External consumers use: vade-app/vade-runtime/.github/workflows/auto-add-prs-to-project-reusable.yml@main
    uses: ./.github/workflows/auto-add-prs-to-project-reusable.yml
    secrets: inherit
