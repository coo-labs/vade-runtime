name: Auto-tag new issues

# Thin trigger: fires on issue open (gapfill mode) or workflow_dispatch
# (full re-classify) and delegates to the canonical reusable workflow
# at vade-app/vade-coo-memory/.github/workflows/auto-tag-issues-reusable.yml.
#
# Centralization: vade-coo-memory#939 (F7). Classification logic +
# canonical taxonomy refs live in the reusable; this file only carries
# the event triggers and the per-repo opt-in. To opt OUT, delete this file.

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to re-tag (full re-classify; overrides gap-fill default)"
        required: true
        type: number

permissions:
  issues: write
  contents: read
  id-token: write  # anthropics/claude-code-action@v1 mints its GitHub token via OIDC

jobs:
  tag:
    # Same-repo call uses relative path (see coo-on-assign.yml note).
    # External consumers use: vade-app/vade-runtime/.github/workflows/auto-tag-issues-reusable.yml@main
    uses: ./.github/workflows/auto-tag-issues-reusable.yml
    with:
      issue-number: ${{ github.event.issue.number || inputs.issue_number }}
      mode: ${{ github.event_name == 'workflow_dispatch' && 'full' || 'gapfill' }}
      opener-is-bot: ${{ github.event.issue.user.type == 'Bot' || false }}
    secrets: inherit
