name: COO on issue assign

# Thin trigger: fires on `issues.assigned` and delegates to the canonical
# reusable workflow at coo-labs/vade-coo-memory/.github/workflows/coo-on-assign-reusable.yml.
#
# Centralization: vade-coo-memory#939 (F7). Logic + COO_SCOPE_REPOS list
# lives in the reusable; this file only carries the event trigger and
# the per-repo opt-in. To opt OUT, delete this file.
#
# Trigger:   gh issue edit <n> --add-assignee vade-coo
# Suppress:  gh issue edit <n> --remove-assignee vade-coo
#
# Idempotency: none by design — every assigned event posts a fresh
# comment. Re-assignment (remove + add) is the explicit re-launch
# primitive (e.g. after a session ended or got stuck).

on:
  issues:
    types: [assigned]

permissions:
  issues: write
  contents: read

jobs:
  post-launch-link:
    # Same-repo call uses relative path (no ref) per GitHub docs:
    # https://docs.github.com/en/actions/sharing-automations/reusing-workflows#calling-a-reusable-workflow
    # — resolves the reusable from the same commit as the caller.
    # External consumers use: coo-labs/vade-runtime/.github/workflows/coo-on-assign-reusable.yml@main
    uses: ./.github/workflows/coo-on-assign-reusable.yml
    secrets: inherit
